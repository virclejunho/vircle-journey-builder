<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIRCLE Journey Builder — 버클 화면 플로우 생성기</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
:root{
  --primary:#0066cc; --primary-focus:#0071e3; --primary-on-dark:#2997ff;
  --canvas:#ffffff; --parchment:#f5f5f7; --pearl:#fafafc;
  --tile-1:#272729; --black:#000000;
  --ink:#1d1d1f; --ink-muted:#333333; --fine:#666666;
  --on-dark:#ffffff; --muted-on-dark:#cccccc;
  --hairline:#e0e0e0; --divider-soft:#f0f0f0;
  --kakao:#FEE500;
  --sans:-apple-system,system-ui,BlinkMacSystemFont,'Pretendard Variable',Pretendard,'Segoe UI',sans-serif;
  --mono:ui-monospace,SFMono-Regular,Menlo,monospace;
  --shadow-product:3px 5px 30px 0 rgba(0,0,0,.22);
  --cardbg:#ffffff; --cardborder:#e0e0e0;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:var(--sans);background:var(--parchment);color:var(--ink);line-height:1.47;-webkit-font-smoothing:antialiased;letter-spacing:-.01em;}
.hidden{display:none !important;}
em{font-style:normal;color:var(--primary);}

/* 나브 */
.global-nav{background:var(--black);color:var(--on-dark);height:44px;position:sticky;top:0;z-index:200;}
.gn-inner{max-width:1240px;margin:0 auto;height:100%;padding:0 28px;display:flex;align-items:center;gap:16px;}
.gn-mark{font-size:15px;font-weight:600;letter-spacing:.12em;}
.gn-label{font-size:12px;color:var(--muted-on-dark);}
.sub-nav{background:rgba(245,245,247,.8);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-bottom:1px solid var(--hairline);position:sticky;top:44px;z-index:190;}
.sn-inner{max-width:1240px;margin:0 auto;min-height:52px;padding:8px 28px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
.sn-title{font-size:21px;font-weight:600;letter-spacing:-.018em;flex:1;min-width:200px;}
.sn-title .sn-sep{color:var(--fine);font-weight:400;margin:0 4px;}
.sn-actions{display:flex;gap:9px;align-items:center;flex-wrap:wrap;}

/* 버튼 */
.btn-pill{font-family:var(--sans);font-size:15px;font-weight:400;letter-spacing:-.01em;cursor:pointer;background:var(--primary);color:#fff;border:none;border-radius:9999px;padding:10px 22px;transition:transform .12s ease;display:inline-flex;align-items:center;gap:6px;}
.btn-pill:active{transform:scale(.95);}
.btn-pill:focus-visible{outline:2px solid var(--primary-focus);outline-offset:2px;}
.btn-ghost-pill{font-family:var(--sans);font-size:15px;font-weight:400;letter-spacing:-.01em;cursor:pointer;background:transparent;color:var(--primary);border:1px solid var(--primary);border-radius:9999px;padding:9px 21px;transition:transform .12s ease;}
.btn-ghost-pill:active{transform:scale(.95);}
.btn-ghost-pill.sm{font-size:13px;padding:7px 16px;}
.btn-util{font-family:var(--sans);font-size:14px;font-weight:400;letter-spacing:-.224px;cursor:pointer;background:var(--ink);color:#fff;border:none;border-radius:8px;padding:9px 16px;transition:transform .12s ease;}
.btn-util:active{transform:scale(.95);}
button:disabled{opacity:.4;cursor:not-allowed;}

/* 위저드 */
#stage-wizard{max-width:880px;margin:0 auto;padding:72px 28px 96px;}
.wz-progress{display:flex;gap:6px;margin-bottom:52px;}
.wz-progress .seg{height:4px;flex:1;border-radius:99px;background:var(--hairline);}
.wz-progress .seg.done{background:var(--primary);}
.wz-progress .seg.cur{background:#7fb5e6;}
.wz-step{animation:rise .5s ease both;}
.wz-kicker{font-size:14px;font-weight:600;letter-spacing:-.224px;color:var(--primary);margin-bottom:16px;}
.wz-q{font-weight:600;font-size:clamp(32px,5vw,52px);letter-spacing:-.03em;line-height:1.07;margin-bottom:18px;}
.wz-sub{font-size:19px;font-weight:400;color:var(--ink-muted);line-height:1.45;margin-bottom:40px;max-width:600px;}
.chan-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;max-width:560px;}
.chan{background:var(--cardbg);border:1px solid var(--cardborder);border-radius:20px;padding:30px 28px;cursor:pointer;transition:transform .12s,border-color .12s,box-shadow .12s;}
.chan:hover{border-color:#c7c7c7;}.chan:active{transform:scale(.985);}
.chan.sel{border-color:var(--primary-focus);box-shadow:0 0 0 1.5px var(--primary-focus);}
.chan .e{font-size:34px;}
.chan h3{font-size:19px;font-weight:600;letter-spacing:-.015em;margin:14px 0 6px;}
.chan p{font-size:14px;color:var(--ink-muted);line-height:1.45;}
.ev-grid{display:flex;flex-wrap:wrap;gap:12px;max-width:720px;}
.ev{background:var(--cardbg);border:1px solid var(--cardborder);border-radius:9999px;padding:15px 24px;font-size:16px;font-weight:600;letter-spacing:-.01em;cursor:pointer;transition:transform .12s,border-color .12s,box-shadow .12s;}
.ev:hover{border-color:#c7c7c7;}.ev:active{transform:scale(.97);}
.ev.sel{background:var(--primary);color:#fff;border-color:var(--primary);}
.cond-grid{display:flex;flex-wrap:wrap;gap:12px;max-width:680px;}
.cond{background:var(--cardbg);border:1px solid var(--cardborder);border-radius:9999px;padding:13px 22px;font-size:15px;font-weight:600;letter-spacing:-.01em;cursor:pointer;display:inline-flex;align-items:center;gap:9px;color:var(--ink-muted);transition:transform .12s,border-color .12s;}
.cond:hover{border-color:#c7c7c7;color:var(--ink);}.cond:active{transform:scale(.97);}
.cond.sel{background:var(--ink);color:#fff;border-color:var(--ink);}
.cond .ck{width:16px;height:16px;border-radius:50%;border:1.5px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;}
.cond.sel .ck::after{content:'✓';}
.brand-box{background:var(--cardbg);border:1px solid var(--cardborder);border-radius:20px;padding:28px 30px;max-width:420px;}
.brand-box label{display:block;font-size:13px;font-weight:600;color:var(--fine);letter-spacing:.06em;margin-bottom:12px;}
.brand-box input{font-family:var(--sans);font-size:24px;font-weight:600;letter-spacing:-.02em;width:100%;border:none;border-bottom:2px solid var(--hairline);background:transparent;padding:6px 0;outline:none;color:var(--ink);}
.brand-box input:focus{border-color:var(--primary);}
.brand-box input::placeholder{color:#c7c7c7;}
.wz-nav{display:flex;justify-content:space-between;align-items:center;margin-top:48px;gap:12px;}
.wz-count{font-size:14px;color:var(--ink-muted);font-variant-numeric:tabular-nums;}
.gen-wrap{text-align:center;padding:40px 0;}
.gen-spin{width:48px;height:48px;border:3px solid var(--hairline);border-top-color:var(--primary);border-radius:50%;margin:0 auto 24px;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* 결과 타일 */
#stage-result{width:100%;}
.tile{width:100%;}
.tile-inner{max-width:1240px;margin:0 auto;padding:72px 28px;}
.tile-inner.tight{padding:52px 28px 32px;}
.t-canvas{background:var(--canvas);}
.t-parchment{background:var(--parchment);}
.t-dark{background:var(--tile-1);color:var(--on-dark);}
.meta{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:34px;}
.chip{background:var(--cardbg);border:1px solid var(--hairline);border-radius:9999px;font-size:14px;font-weight:400;padding:8px 16px;color:var(--ink-muted);}
.chip b{color:var(--ink);font-weight:600;}
.sec-head{display:flex;align-items:baseline;gap:14px;margin-bottom:24px;flex-wrap:wrap;}
.sec-num{font-weight:600;font-size:15px;color:var(--primary);letter-spacing:.04em;}
.sec-head h2{font-weight:600;font-size:clamp(24px,3vw,34px);letter-spacing:-.02em;}
.sec-head .hint{font-size:14px;color:var(--ink-muted);margin-left:auto;font-weight:400;}
.t-dark .sec-num{color:var(--primary-on-dark);}.t-dark .hint{color:var(--muted-on-dark);}

/* 액션 레전드 */
.legend{display:flex;flex-wrap:wrap;gap:8px 16px;margin-bottom:26px;}
.lg{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;color:var(--muted-on-dark);font-weight:500;}
.lg i{width:11px;height:11px;border-radius:3px;display:inline-block;}

/* 플로우 (다크 스테이지) */
.canvas{overflow-x:auto;padding:6px 0 12px;}
.flow-col{display:inline-flex;flex-direction:column;min-width:max-content;}
.flow-row{display:inline-flex;align-items:flex-start;}
.group{text-align:center;animation:rise .6s ease both;}
.g-lbl{display:inline-block;font-size:11.5px;font-weight:600;letter-spacing:-.01em;border-radius:9999px;padding:5px 14px;margin-bottom:14px;color:#fff;}
.g-lbl.branch{background:#8a8a8e;}
.g-phones{display:flex;justify-content:center;gap:10px;position:relative;}
.g-phones.editable{cursor:pointer;}
.g-phones.editable .phone{transition:transform .15s cubic-bezier(.2,.7,.3,1),box-shadow .15s;}
.g-phones.editable:hover .phone{transform:translateY(-4px);box-shadow:0 16px 40px -12px rgba(0,0,0,.55),0 0 0 2px var(--brand,var(--primary));}
.g-phones.editable::after{content:'✎ 수정';position:absolute;top:9px;left:50%;transform:translateX(-50%) translateY(-6px);background:rgba(20,20,22,.82);color:#fff;font-size:10.5px;font-weight:600;letter-spacing:.01em;padding:4px 11px;border-radius:999px;opacity:0;pointer-events:none;transition:opacity .15s,transform .15s;z-index:4;white-space:nowrap;-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);}
.g-phones.editable:hover::after{opacity:1;transform:translateX(-50%) translateY(0);}
.modal-bg:not(.hidden) .modal{animation:modalIn .18s cubic-bezier(.2,.7,.3,1);}
@keyframes modalIn{from{opacity:0;transform:translateY(10px) scale(.985);}to{opacity:1;transform:none;}}
.arr{align-self:center;color:var(--primary-on-dark);font-size:22px;padding:0 14px;margin-top:30px;}
.branch-row{margin-top:14px;}
.b-tag{color:var(--primary-on-dark);font-size:13px;font-weight:600;padding-top:46px;padding-right:10px;white-space:nowrap;}
.p-cap{font-size:12px;color:var(--muted-on-dark);margin-top:9px;}

/* 폰 */
.phone{width:140px;height:266px;background:#fff;border-radius:20px;padding:0;overflow:hidden;display:flex;flex-direction:column;position:relative;text-align:left;box-shadow:var(--shadow-product);transition:transform .2s;}
.phone:hover{transform:translateY(-5px);}
.phone::before{content:'';position:absolute;top:7px;left:50%;transform:translateX(-50%);width:36px;height:4px;border-radius:99px;background:#e5e5ea;}
.ptag{font-size:8.5px;font-weight:700;letter-spacing:.04em;color:var(--fine);text-transform:uppercase;margin-top:6px;}
.pimg{border-radius:10px;background:#efeff1;color:var(--ink-muted);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:11px;font-weight:600;line-height:1.4;background-size:cover;background-position:center;}
.pimg.slot{transition:box-shadow .12s;}
.pimg.filled{color:transparent;}
.ptitle{font-size:12px;font-weight:600;color:var(--ink);line-height:1.35;}
.ptext{font-size:10px;color:var(--ink-muted);line-height:1.45;}
.pbtn{margin-top:auto;width:100%;background:var(--ink);color:#fff;font-size:10px;font-weight:600;border-radius:9999px;padding:8px 4px;}
.pbtn.blue{background:var(--brand,var(--primary));}.pbtn.kakao{background:var(--kakao);color:#191600;}
.pbtn.outline{background:transparent;color:var(--ink);border:1px solid var(--hairline);}
.qr-box{display:grid;grid-template-columns:repeat(5,1fr);gap:2px;padding:6px;background:#fff;border:1px solid #eee;border-radius:7px;margin:6px auto 0;}
.qr-box i{background:#1d1d1f;border-radius:1px;aspect-ratio:1;}.qr-box i.o{background:transparent;}
.vmark{width:46px;height:46px;border-radius:50%;background:var(--brand,var(--primary));margin:10px auto 0;display:flex;align-items:center;justify-content:center;}
.vmark span{color:#fff;font-size:11px;font-weight:700;}
.badge.g{display:inline-block;font-size:9px;font-weight:600;color:#1A7A3A;background:#E6F4EA;border-radius:9999px;padding:2px 9px;}
.tog-row{display:flex;align-items:center;justify-content:space-between;font-size:9px;color:#666;background:#f5f5f7;border-radius:6px;padding:5px 7px;}
.tog-sw{width:22px;height:12px;border-radius:99px;background:#d2d2d7;position:relative;}
.tog-sw.on{background:var(--primary);}
.tog-sw::after{content:'';position:absolute;top:2px;left:2px;width:8px;height:8px;border-radius:50%;background:#fff;}
.tog-sw.on::after{left:auto;right:2px;}

/* 표 */
.tbl-wrap{overflow-x:auto;border:1px solid var(--hairline);border-radius:14px;background:var(--canvas);}
table.tbl{width:100%;border-collapse:collapse;font-size:14px;min-width:640px;}
table.tbl th{text-align:left;font-weight:600;color:var(--fine);font-size:12.5px;letter-spacing:.02em;padding:12px 16px;border-bottom:1px solid var(--hairline);background:#fafafa;white-space:nowrap;}
table.tbl td{padding:12px 16px;border-bottom:1px solid var(--divider-soft);vertical-align:middle;}
table.tbl tr:last-child td{border-bottom:none;}
.act-dot{display:inline-flex;align-items:center;gap:7px;font-weight:600;}
.act-dot i{width:9px;height:9px;border-radius:3px;}
.comp{font-family:var(--mono);font-size:12.5px;color:var(--primary);background:rgba(0,102,204,.07);border-radius:6px;padding:3px 8px;white-space:nowrap;}
.scr-th{font-weight:600;color:var(--ink);}

/* 분기/상태 */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
@media(max-width:740px){.two-col{grid-template-columns:1fr;}}
.panel{background:var(--cardbg);border:1px solid var(--hairline);border-radius:16px;padding:22px 24px;}
.panel h3{font-size:15px;font-weight:600;margin-bottom:14px;letter-spacing:-.01em;}
.state-chips{display:flex;flex-wrap:wrap;gap:8px;}
.state-chip{font-size:13px;font-weight:500;color:var(--ink-muted);background:#f0f0f2;border-radius:9999px;padding:6px 13px;}
.branch-item{display:flex;align-items:center;gap:10px;font-size:14px;padding:10px 0;border-top:1px solid var(--divider-soft);}
.branch-item:first-child{border-top:none;}
.branch-item .cond{color:var(--primary-on-dark);}
.bc{font-size:12px;font-weight:600;color:#fff;background:#8a8a8e;border-radius:9999px;padding:3px 10px;white-space:nowrap;}
.barrow{color:var(--fine);}

/* JSON */
.json-head{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
.json-box{background:#1d1d1f;color:#e6e6e6;border-radius:14px;padding:20px 22px;overflow-x:auto;font-family:var(--mono);font-size:12.5px;line-height:1.6;max-height:420px;overflow-y:auto;}
.json-box .k{color:#7fb5e6;}.json-box .s{color:#9FE3C0;}.json-box .n{color:#F2C7AC;}

/* 운영 체크리스트 */
.ops{display:flex;flex-direction:column;gap:2px;max-width:760px;}
.op-item{display:flex;align-items:center;gap:12px;padding:11px 6px;font-size:14.5px;border-top:1px solid var(--divider-soft);cursor:pointer;border-radius:8px;}
.op-item:first-child{border-top:none;}
.op-item:hover{background:rgba(0,0,0,.03);}
.op-item input{accent-color:var(--primary);width:17px;height:17px;flex-shrink:0;}
.op-item.done span{text-decoration:line-through;color:var(--fine);}

footer{max-width:1240px;margin:0 auto;padding:34px 28px 72px;display:flex;gap:14px;align-items:center;flex-wrap:wrap;}
footer .foot-mark{font-weight:600;letter-spacing:.12em;color:var(--ink);}
footer p{font-size:13px;color:var(--ink-muted);}footer .v{margin-left:auto;font-size:12px;color:var(--fine);}
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);color:#fff;font-size:14px;border-radius:9999px;padding:13px 24px;transition:transform .3s cubic-bezier(.2,.9,.3,1.2);z-index:999;box-shadow:0 12px 32px rgba(0,0,0,.24);}
#toast.show{transform:translateX(-50%) translateY(0);}
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@media print{
  @page{size:A4 landscape;margin:10mm;}
  body{background:#fff;}.global-nav,.sub-nav{position:static;}
  .sn-actions,#stage-wizard{display:none!important;}
  .tile-inner{padding:16px 8px;}.t-dark{background:#fff;color:var(--ink);}
  .t-dark .g-lbl{filter:none;}.t-dark .arr{color:var(--primary);}.t-dark .p-cap,.t-dark .lg,.t-dark .hint{color:var(--ink-muted);}.t-dark .sec-head h2{color:var(--ink);}
  .canvas{overflow:visible;}.flow-col{min-width:0;}.flow-row{flex-wrap:wrap;row-gap:18px;}
  .phone{box-shadow:none;border:1px solid var(--hairline);}.phone:hover{transform:none;}
  .json-box{max-height:none;}.tile{break-inside:avoid-page;}
  *{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .card-upload,.task-del,.task-add{display:none!important;}
  .pimg.slot:not(.filled){color:transparent!important;}
  .branch-row{margin-left:0!important;}
  .task-date{border:none!important;appearance:none;-webkit-appearance:none;color:var(--ink)!important;padding:0!important;}
  .task-date::-webkit-calendar-picker-indicator,.task-date::-webkit-inner-spin-button{display:none!important;}
}
/* 일정 설정 (위저드) */
.date-row{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:18px;}
.date-field label{display:block;font-size:13px;font-weight:600;color:var(--fine);margin-bottom:8px;letter-spacing:.02em;}
.date-field input[type=date]{font-family:var(--sans);font-size:16px;padding:12px 16px;border:1px solid var(--hairline);border-radius:12px;background:var(--canvas);color:var(--ink);}
.date-field input[type=date]:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 1px var(--primary);}
.dtoggle{display:inline-flex;align-items:center;gap:11px;cursor:pointer;font-size:15px;font-weight:400;background:var(--canvas);border:1px solid var(--hairline);border-radius:9999px;padding:11px 19px;}
.dtoggle.on{border-color:var(--primary);}
.dtoggle-sw{width:38px;height:21px;border-radius:99px;background:var(--hairline);position:relative;transition:background .2s;}
.dtoggle.on .dtoggle-sw{background:var(--primary);}
.dtoggle-sw::after{content:'';position:absolute;top:2px;left:2px;width:17px;height:17px;border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
.dtoggle.on .dtoggle-sw::after{transform:translateX(17px);}
/* 카드 이미지 업로드 */
.card-hero{height:44px;border-radius:8px;background-size:cover;background-position:center;margin-bottom:4px;}
/* ===== 실제 버클 화면 충실 재현 키트 ===== */
.sc{display:flex;flex-direction:column;height:100%;width:100%;font-size:10px;color:var(--ink);overflow:hidden;}
.sc .pimg{margin:0;}
.sc-pad{display:flex;flex-direction:column;height:100%;padding:11px;gap:6px;}
.sc-stat{display:flex;justify-content:space-between;align-items:center;padding:5px 11px 1px;font-size:8px;font-weight:600;}
.sc-stat .r{letter-spacing:.5px;}
.sc-lhead{display:flex;align-items:center;gap:5px;padding:5px 8px;background:#fff;border-bottom:1px solid #efefef;font-size:8px;color:#999;}
.sc-lhead b{color:#333;font-weight:600;font-size:8.5px;}
.sc-lhead .kk{width:13px;height:13px;border-radius:50%;background:var(--kakao);}
.sc-h{font-size:13px;font-weight:700;line-height:1.3;color:var(--ink);}
.sc-h.on-dark{color:#fff;}
.sc-sub{font-size:9px;color:#8e8e93;line-height:1.45;}
.sc-sheet{margin-top:auto;background:#fff;border-radius:15px 15px 0 0;padding:11px;box-shadow:0 -3px 14px -6px rgba(0,0,0,.16);display:flex;flex-direction:column;gap:5px;}
.sc-cta{width:100%;text-align:center;font-size:10px;font-weight:700;border-radius:11px;padding:9px 4px;}
.sc-cta.dark{background:var(--ink);color:#fff;}
.sc-cta.kakao{background:var(--kakao);color:#191600;}
.sc-cta.brand{background:var(--brand,var(--primary));color:#fff;}
.sc-cta.ghost{background:transparent;color:#8e8e93;font-weight:600;padding:5px;}
.sc-cta.outline{background:transparent;border:1px solid #ddd;color:var(--ink);}
.sc-agree{background:#f5f5f7;border-radius:9px;padding:7px;display:flex;flex-direction:column;gap:5px;}
.sc-agree .ar{display:flex;align-items:center;gap:5px;font-size:8.5px;color:#777;}
.sc-agree .ar .ck{color:var(--brand,var(--primary));font-weight:800;}
.sc-card{background:#fff;border:1px solid #eee;border-radius:10px;padding:8px;font-size:8.5px;color:#666;line-height:1.5;}

/* ════════ Screen Type → Figma Component 매핑 ════════ */
const TYPE_META={
  qr_entry:{st:'QR 진입',comp:'Entry/QR/Offline'},

  auth_phone:{st:'휴대폰 인증(선택)',comp:'Auth/Phone/Basic'},
  signup:{st:'약관·멤버십 동의',comp:'Signup/Agreement/Basic'},
  lounge_home:{st:'라운지 홈',comp:'Lounge/Home/Member'},

  warranty_issue:{st:'보증서 발급',comp:'Warranty/Issue/Card'},
  ticket:{st:'티켓/교환권',comp:'Reward/Ticket/Issued'},

  admin_scan:{st:'관리자 QR 스캔',comp:'Checkin/Admin/Scan'},

  share:{st:'공유하기',comp:'Share/CTA/Basic'},
};
/* 이미지(슬롯)를 렌더하는 화면 = ＋사진 업로드 가능 화면 (SCR에서 slotImg/kkChat 쓰는 타입과 일치) */
const IMG_SLOTS=['crm_entry','landing','msg_alimtalk','msg_friendtalk','auth_kakao','signup','lounge_home','participate','luckydraw','photocard_sel','photocard_issued','warranty_issue','reward_tier','reward','rsvp_apply','share'];
/* 화면은 브랜드 중립 템플릿(SCR)으로 렌더 — 특정 고객사 캡처/이미지를 쓰지 않는다.
   각 업체가 폼(필드)·＋사진으로 자기 브랜드 화면을 만든다. */

/* ════════ 폰 화면 렌더러 ════════ */
function photoOf(slot){ return state.photoSlots[slot] || ''; }
function slotImg(slot,style){
  const url=photoOf(slot), bg=url?`background-image:url('${url}');`:'';
  return `<div class="pimg slot ${url?'filled':''}" style="${style||''}${bg}">${url?'':'＋ 제품 사진'}</div>`;
}
const QR=(n)=>`<div class="qr-box" style="width:${n}px;height:${n}px">${Array.from({length:25},(_,i)=>`<i class="${[2,5,7,11,13,16,19,22].includes(i)?'o':''}"></i>`).join('')}</div>`;
const SCR={
  qr_entry:(s)=>`<div class="sc"><div class="sc-pad" style="align-items:center;justify-content:center;gap:9px;">${QR(66)}<div class="sc-sub" style="text-align:center;">${s.title||'매장 QR을 스캔하세요'}</div>${s.desc?`<div class="sc-sub" style="text-align:center;font-size:8px;color:#aaa;">${s.desc}</div>`:''}</div></div>`,
  crm_entry:(s)=>kkChat(s,{badge:'',kind:s.title||'이벤트 안내',body:s.body||'지금 참여하고 혜택을 받아보세요',cta:s.cta||'참여하기',imgH:46}),
  landing:(s)=>`<div class="sc" style="background:#000;"><div class="sc-pad" style="gap:8px;"><div class="sc-h on-dark">${s.title||'이벤트에 참여하고 혜택을 받아보세요'}</div>${s.desc?`<div class="sc-sub" style="color:#bbb;">${s.desc}</div>`:''}${slotImg(s.slot,'flex:1;border-radius:9px;min-height:92px;')}<div class="sc-cta outline" style="border-color:#333;color:#fff;">${s.cta||'참여하기'}</div></div></div>`,
  msg_alimtalk:(s)=>kkChat(s,{badge:'정보성',kind:s.msgKind||'쿠폰 리마인드',body:s.body||'쿠폰이 곧 만료됩니다',cta:s.cta||'쿠폰 확인하기',imgH:40,timing:s.timing}),
  msg_friendtalk:(s)=>kkChat(s,{badge:'광고성',kind:s.title||'단독 혜택 안내',benefit:s.benefit,body:s.body||'',cta:s.cta||'혜택 보기',imgH:54,brandBtn:true,seg:s.segment}),
  auth_kakao:(s)=>`<div class="sc" style="background:#111;"><div style="flex:1;display:flex;flex-direction:column;padding:11px;">${slotImg(s.slot,'flex:1;border-radius:9px;min-height:58px;')}</div><div class="sc-sheet"><div style="font-size:11px;font-weight:700;">${s.title||'혜택을 받기 위해 로그인이 필요해요'}</div><div class="sc-sub">${s.desc||'전용 혜택을 받으려면 로그인해주세요'}</div><div class="sc-cta kakao">💬 ${s.cta||'카카오로 시작하기'}</div><div class="sc-cta ghost">다른 방법으로 시작 ⌄</div></div></div>`,

function phone(type,props={}){
  const fn=SCR[type]; const inner=fn?fn(props):`<div class="sc-pad"><div class="sc-sub" style="margin-top:30px;text-align:center;">${type}</div></div>`;
  return `<div class="phone" style="--brand:${state.brandColor||'#0066cc'}">${inner}</div>`;
}

/* ════════ 사진 업로드 (화면별) ════════ */
let _pickTarget=null;
function _fileInput(){ let el=document.getElementById('photo-input'); if(!el){el=document.createElement('input');el.type='file';el.accept='image/*';el.id='photo-input';el.style.display='none';el.onchange=_onPick;document.body.appendChild(el);} return el; }
function pickSlot(slot){ _pickTarget=slot; _fileInput().click(); }
function removeSlot(slot){ delete state.photoSlots[slot]; savePhotos(); renderFlow(); toast('사진을 제거했어요'); }
function _onPick(e){ const f=e.target.files[0]; if(!f)return; const r=new FileReader(); r.onload=ev=>{ state.photoSlots[_pickTarget]=ev.target.result; e.target.value=''; savePhotos(); renderFlow(); if(!document.getElementById('edit-modal').classList.contains('hidden')) edLive(); toast('이 화면에 제품 사진을 적용했어요'); }; r.readAsDataURL(f); }
function photoKey(){ return 'vjb-photos-'+(state.brand||'x')+'|'+(state.ev||'x'); }
function savePhotos(){ try{ localStorage.setItem(photoKey(),JSON.stringify(state.photoSlots)); }catch(e){ /* 용량 초과 시 세션 내 유지만 */ } }
function loadPhotos(){ try{ const o=JSON.parse(localStorage.getItem(photoKey())||'null'); if(o&&typeof o==='object') return o; }catch(e){} return {}; }

/* ════════ 플로우 조립 ════════ */
function buildFlow(){
  const off=state.ch==='offline';
  const o=state.opts;
  const hasSu=o.includes('signup'), hasMo=o.includes('member_only'), hasFc=o.includes('firstcome'), hasSh=o.includes('share'), hasCk=o.includes('checkin');
  const entry=off
    ?{id:'e1',n:'QR 진입',a:'진입',t:'qr_entry',cap:'매장/팝업 입구'}
    :{id:'e1',n:'CRM 발송',a:'진입',t:'crm_entry',p:{ch:'친구톡',title:'이벤트 안내',cta:'참여하기'},cap:'친구톡/알림톡'};
  const auth={id:'e2',n:'카카오 로그인',a:'인증',t:'auth_kakao',p:{title:'로그인하고 혜택받기',cta:'카카오톡으로 시작'}};
  let main=[entry,auth];
  if(hasSu) main.push({id:'e3',n:'약관·멤버십 동의',a:'가입',t:'signup'});

  let branches=[{from:'e2',cond:'비회원',n:'가입 안내',t:'signup',cap:'라운지 회원가입 유도'}];
  if(hasMo) branches.push({from:'e2',cond:'구매 이력 없음',n:'가입 후 둘러보기',t:'signup',cap:'비구매자도 라운지 가입 유도'});

  const ev=EV[state.ev]||EV.coupon;
  let screens=[...main,...ev.screens.map(s=>({...s}))];
  if(hasSh) screens.push({id:'sh',n:'공유 유도',a:'공유',t:'share'});
  if(hasCk && state.ev!=='checkin'){
    const idx=screens.findIndex(s=>s.a==='발급'||s.a==='리워드');
    if(idx>-1) screens.splice(idx,0,{id:'ck',n:'현장 체크인',a:'체크인',t:'checkin_qr'});
  }
  /* 선착순 마감은 별도 화면 없이 상태값(분기)으로만 표현 — renderBranchesStates */
  branches=[...branches,...ev.branches];
  // 슬롯 id 부여 (화면별 사진 업로드 — 모든 카드)
  screens.forEach(s=>{ s.slot='s_'+s.id; });
  branches.forEach((b,i)=>{ b.slot='sb_'+i; });
  return {name:ev.n,emoji:ev.e,screens,branches};
}

/* ════════ 화면 내용 수정 ════════ */
/* 화면 타입별 폼 — 업체가 채우면 자기 브랜드 화면이 된다 */
const FIELD_LABEL={title:'제목 / 헤드라인',desc:'설명',body:'본문',cta:'버튼 문구',sub:'서브텍스트',prize:'경품 / 혜택',benefit:'혜택 / 할인 / 경품',validity:'유효기간 / 보증기간',condition:'사용조건',channel:'사용 채널 / 매장',segment:'수신 세그먼트',timing:'발송 타이밍',ch:'발송 채널',msgType:'메시지 유형(정보성/광고성)',msgKind:'세부 유형',agreeItems:'동의 항목',menuItems:'메뉴 항목',couponList:'쿠폰 목록',tiers:'구간별 사은품',hint:'힌트',schedule:'일정 · 장소',guestName:'예약자명',num:'응모번호',date:'발표일'};
const FIELDS={
  qr_entry:['title','desc'], crm_entry:['ch','msgType','title','body','cta','timing','segment'], landing:['title','desc','cta'],
  msg_alimtalk:['msgKind','body','cta','timing'], msg_friendtalk:['msgKind','title','body','benefit','cta','segment'],
  auth_kakao:['title','desc','cta'], auth_phone:['title'], signup:['title','agreeItems','desc','cta'], lounge_home:['title','menuItems'],
  participate:['title','desc','hint','cta'], luckydraw:['title','desc','cta'],
  winner:['title','prize','cta'], loser:['title','desc','cta'],
  photocard_sel:['title','cta'], photocard_issued:['title','cta'],
  coupon:['title','benefit','validity','condition','channel','cta'], coupon_box:['title','couponList'],
  warranty_issue:['title','desc','validity'], ticket:['title','desc'], reward_tier:['title','tiers'], reward:['title','desc','cta'],
  rsvp_apply:['title','desc','schedule','cta'], rsvp_detail:['guestName','schedule','cta'], reserve_done:['title','desc'],
  checkin_qr:['title','desc','cta'], admin_scan:['title','cta'], checkin_done:['title','cta'],
  share:['title','desc','cta'],
};
function fieldsFor(t){ return FIELDS[t]||['title','desc','cta']; }
let _edIdx=0;
function openEdit(idx){
  _edIdx=idx; const s=FLOW.screens[idx]; if(!s)return; const p=s.p||{};
  let form=`<p style="font-size:12.5px;color:var(--fine);line-height:1.5;margin:0 0 16px;"><b style="color:var(--ink);">${(TYPE_META[s.t]||{}).st||s.t}</b> — 사진·문구를 바꾸면 왼쪽 미리보기에 바로 반영됩니다.</p>`;
  if(IMG_SLOTS.includes(s.t)){
    const u=photoOf(s.slot);
    form+=`<div class="ed-photo"><div class="ed-photo-thumb" id="ed-photo-thumb" style="background-image:${u?`url('${u}')`:'none'};">${u?'':'🖼'}</div>`
      +`<div style="flex:1;min-width:0;"><div style="font-size:12.5px;font-weight:600;color:var(--ink);">제품 사진</div><div style="font-size:11px;color:var(--fine);">이 화면에 들어갈 이미지</div></div>`
      +`<button class="btn-ghost-pill sm" onclick="edPickPhoto()">${u?'교체':'＋ 올리기'}</button>`
      +`<button class="btn-ghost-pill sm" id="ed-photo-rm" style="display:${u?'':'none'};" onclick="edRemovePhoto()">제거</button></div>`;
  }
  form+=`<div class="ef-row"><label>화면 이름 (플로우 라벨)</label><input id="ed-n" value="${escAttr(s.n)}" oninput="edLive()"></div>`;
  fieldsFor(s.t).forEach(k=>{ form+=`<div class="ef-row"><label>${FIELD_LABEL[k]||k}</label><input id="ed-${k}" value="${escAttr(p[k]||'')}" placeholder="(비우면 기본값)" oninput="edLive()"></div>`; });
  form+=`<div class="ef-actions"><button class="btn-ghost-pill sm" onclick="closeEdit()">취소</button><button class="btn-pill" onclick="saveEdit()">저장</button></div>`;
  document.getElementById('ed-body').innerHTML=`<div class="ed-grid"><div class="ed-preview"><div class="ed-pv" id="ed-pv"></div><div class="ed-pv-cap">미리보기</div></div><div class="ed-form">${form}</div></div>`;
  edLive();
  document.getElementById('edit-modal').classList.remove('hidden');
  setTimeout(()=>document.getElementById('ed-n')?.focus(),50);
}
/* 실시간 미리보기 — 현재 입력값으로 큰 화면을 다시 그린다 */
function edLive(){
  const s=FLOW.screens[_edIdx]; if(!s)return; const p={...(s.p||{})};
  fieldsFor(s.t).forEach(k=>{ const el=document.getElementById('ed-'+k); if(el){ const v=(el.value||'').trim(); if(v) p[k]=v; else delete p[k]; } });
  p.slot=s.slot; p.brand=state.brand;
  const pv=document.getElementById('ed-pv'); if(pv) pv.innerHTML=phone(s.t,p);
  const th=document.getElementById('ed-photo-thumb'); if(th){ const u=photoOf(s.slot); th.style.backgroundImage=u?`url('${u}')`:'none'; th.textContent=u?'':'🖼'; }
  const rm=document.getElementById('ed-photo-rm'); if(rm) rm.style.display=photoOf(s.slot)?'':'none';
}
function edPickPhoto(){ const s=FLOW.screens[_edIdx]; if(s) pickSlot(s.slot); }
function edRemovePhoto(){ const s=FLOW.screens[_edIdx]; if(s){ delete state.photoSlots[s.slot]; savePhotos(); renderFlow(); edLive(); toast('사진을 제거했어요'); } }
function closeEdit(){ document.getElementById('edit-modal').classList.add('hidden'); }
function saveEdit(){
  const s=FLOW.screens[_edIdx]; if(!s)return;
  const n=document.getElementById('ed-n'); if(n) s.n=n.value.trim()||s.n;
  s.p=s.p||{};
  fieldsFor(s.t).forEach(k=>{ const el=document.getElementById('ed-'+k); if(el){ const v=el.value.trim(); if(v) s.p[k]=v; else delete s.p[k]; } });
  closeEdit(); afterEdit(); toast('화면 폼을 저장했어요');
}
function renderScreenTable(){
  const all=[...FLOW.screens.map(s=>({...s,branch:false})),...FLOW.branches.map(b=>({n:b.n,a:'분기',t:b.t,branch:true}))];
  document.getElementById('screen-rows').innerHTML=all.map((s,i)=>{
    const m=TYPE_META[s.t]||{st:s.t,comp:s.t};
    return `<tr><td>${s.branch?'분기':i+1}</td><td class="scr-th">${s.n}</td><td><span class="act-dot"><i style="background:${AC[s.a]||'#888'}"></i>${s.a}</span></td><td>${m.st}</td><td><span class="comp">${m.comp}</span></td></tr>`;
  }).join('');
}
function renderBranchesStates(){
  const types=new Set(FLOW.screens.map(s=>s.t));
  const st=['인증 성공 / 실패'];
  if(state.opts.includes('signup')||types.has('signup')) st.push('회원 / 비회원');
  if(state.opts.includes('member_only')) st.push('구매자 / 비구매자');
  if(types.has('msg_alimtalk')||types.has('msg_friendtalk')||types.has('crm_entry')) st.push('정보성(알림톡) / 광고성(친구톡)');
  if(types.has('msg_friendtalk')||types.has('crm_entry')) st.push('VIP·충성 / 일반 세그먼트');
  if(types.has('winner')||types.has('loser')) st.push('당첨 / 미당첨');
  if(types.has('rsvp_apply')||types.has('rsvp_detail')) st.push('예약 가능 / 예약 마감');
  if(state.opts.includes('firstcome')) st.push('선착순 가능 / 마감');
  if([...types].some(t=>t.startsWith('checkin'))||types.has('admin_scan')) st.push('체크인 전 / 체크인 완료');
  if(types.has('coupon')||types.has('coupon_box')) st.push('쿠폰 사용 전 / 사용 완료');
  if(types.has('warranty_issue')) st.push('보증서 발급 전 / 발급 완료');
  document.getElementById('states').innerHTML=st.map(s=>`<span class="state-chip">${s}</span>`).join('');
  document.getElementById('branches').innerHTML=FLOW.branches.length
    ? FLOW.branches.map(b=>`<div class="branch-item"><span class="bc">${b.cond}</span><span class="barrow">→</span><span>${b.n}</span></div>`).join('')
    : `<div class="branch-item" style="color:var(--fine)">조건 분기 없음</div>`;
}
function figmaJSON(){
  const flow=FLOW.screens.map((s,i)=>({id:s.id,screen_name:s.n,atomic_action:s.a,component_name:(TYPE_META[s.t]||{}).comp||s.t,x:i*420,y:0}));
  FLOW.branches.forEach((b,i)=>{ const fi=Math.max(0,FLOW.screens.findIndex(s=>s.id===b.from)); flow.push({id:'b'+i,screen_name:b.n,atomic_action:'분기',component_name:(TYPE_META[b.t]||{}).comp||b.t,x:fi*420,y:300}); });
  const connections=[];
  for(let i=0;i<FLOW.screens.length-1;i++) connections.push({from:FLOW.screens[i].id,to:FLOW.screens[i+1].id,label:'CTA'});
  FLOW.branches.forEach((b,i)=>connections.push({from:b.from,to:'b'+i,label:b.cond}));
  return {campaign:FLOW.name,channel:state.ch,brand:state.brand,flow,connections};
}
function renderJSON(){
  const json=JSON.stringify(figmaJSON(),null,2);
  const esc=json.replace(/&/g,'&amp;').replace(/</g,'&lt;');
  const hi=esc.replace(/"([^"]+)":/g,'"<span class="k">$1</span>":').replace(/: "([^"]*)"/g,': "<span class="s">$1</span>"').replace(/: (\d+)/g,': <span class="n">$1</span>');
  document.getElementById('json-box').innerHTML=hi;
}
const saved=JSON.parse(localStorage.getItem('vjb-ops')||'{}');
function opsList(){
  const types=new Set(FLOW.screens.map(s=>s.t));
  const acts=new Set(FLOW.screens.map(s=>s.a));
  const items=[];
  if(state.opts.includes('signup')||types.has('signup')){ items.push('개인정보 수집·이용 동의 항목 확정'); items.push('마케팅 수신 동의(선택) 문구 준비'); }
  if(state.ch==='online') items.push('CRM 발송 채널(친구톡/알림톡)·발송 모수 준비');
  if(types.has('coupon')) items.push('쿠폰 수량·재고·유효기간 설정');
  if(types.has('ticket')) items.push('티켓 발급 수량·입장 검증 방식');
  if(acts.has('당첨')||state.opts.includes('firstcome')) items.push('당첨자 선정 방식 확정 (즉시/추첨/선착순)');
  if(types.has('rsvp_apply')) items.push('RSVP 일정·장소·정원 설정');
  if(acts.has('체크인')) items.push('현장 스태프 QR/NFC 확인 절차');
  if(state.opts.includes('member_only')) items.push('구매자/회원 자격 판별 기준');
  if(state.opts.includes('share')) items.push('공유 리워드 지급 기준·중복 방지');
  items.push('진입 채널별 링크/QR 발급 및 동선 점검');
  return items;
}
function renderOps(){
  document.getElementById('ops').innerHTML=opsList().map((t,i)=>{
    const key=(state.brand||'x')+'|'+state.ev+'-'+i, done=!!saved[key];
    return `<label class="op-item ${done?'done':''}"><input type="checkbox" ${done?'checked':''} onchange="toggleOp('${key}',this)"><span>${t}</span></label>`;
  }).join('');
}
function toggleOp(key,el){ saved[key]=el.checked; localStorage.setItem('vjb-ops',JSON.stringify(saved)); el.closest('.op-item').classList.toggle('done',el.checked); }

/* ════════ 일정 & 할 일 (편집 가능) ════════ */
const OWN_LBL={vircle:'버클',brand:'브랜드',both:'함께'};
const OWN_NEXT={vircle:'brand',brand:'both',both:'vircle'};
let _tid=0;
function parseD(s){ if(!s) return null; const [y,m,dd]=s.split('-').map(Number); return new Date(y,m-1,dd); }
function fmtD(d){ return d?`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`:''; }
function relToDate(rel){
  const s=parseD(state.start); if(!s) return ''; const e=parseD(state.end); let m;
  if(rel==='D-day') return fmtD(s);
  if(rel.includes('마감')||rel==='종료') return e?fmtD(e):'';
  if((m=rel.match(/D-(\d+)/))){ const d=new Date(s); d.setDate(s.getDate()-(+m[1])); return fmtD(d); }
  if((m=rel.match(/D\+(\d+)/))){ const d=new Date(s); d.setDate(s.getDate()+(+m[1])); return fmtD(d); }
  return '';
}
function seedTasks(){
  const types=new Set(FLOW.screens.map(s=>s.t));
  const seeds=[];
  const add=(label,owner,rel)=>seeds.push({label,owner,rel});
  add('화면·소재(제품 이미지) 확정','brand','~D-7');
  add('이벤트 정책 확정 (당첨·선착순·예약 정원 등)','both','~D-7');
  if(state.teasing && state.ch==='online') add('티징(예고) 발송 카피 컨펌','both','D-3');
  add('버클 콘솔 세팅 (라운지·혜택·메시지)','vircle','~D-3');
  add('전체 플로우 리허설 · QA','both','~D-3');
  add(state.ch==='offline'?'현장 QR·동선·스태프 점검':'CRM 발송 카피·모수 확정','brand','D-1');
  add('오픈 — 발송 / 진입 시작','vircle','D-day');
  if(types.has('rsvp_apply')) add('RSVP 현황 모니터링·리마인드','vircle','D-day');
  add('종료 — 미사용 쿠폰/세그먼트 추출','vircle','마감일');
  add('성과 측정 · 리뷰','vircle','D+7');
  return seeds.map(s=>({id:'t'+(_tid++),label:s.label,owner:s.owner,date:relToDate(s.rel),done:false}));
}
function taskKey(){ return 'vjb-tasks-'+(state.brand||'x')+'|'+(state.ev||'x'); }
function loadTasks(){
  try{ const a=JSON.parse(localStorage.getItem(taskKey())||'null'); if(Array.isArray(a)){ a.forEach((t,i)=>{t.id='t'+i;}); _tid=a.length; return a; } }catch(e){}
  return seedTasks();
}
function saveTasks(){ localStorage.setItem(taskKey(),JSON.stringify(state.tasks)); }
function escHtml(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function renderSched(){
  const rows=[...state.tasks].sort((a,b)=>(a.date||'9999-99-99').localeCompare(b.date||'9999-99-99'));
  if(!rows.length){ document.getElementById('sched').innerHTML=`<div class="task-empty">아직 등록된 할 일이 없어요. 아래 <b>＋ 할 일 추가</b>로 시작하세요.</div>`; return; }
  document.getElementById('sched').innerHTML=rows.map(t=>`
    <div class="task-row ${t.done?'done':''}">
      <input type="checkbox" ${t.done?'checked':''} onchange="toggleTask('${t.id}',this.checked)">
      <input type="date" class="task-date" value="${t.date||''}" onchange="setTaskDate('${t.id}',this.value)">
      <span class="task-text" contenteditable="true" spellcheck="false" onblur="editTask('${t.id}',this.textContent)">${escHtml(t.label)}</span>
      <span class="task-owner o-${t.owner}" onclick="cycleOwner('${t.id}')" title="담당 전환 (버클→브랜드→함께)">${OWN_LBL[t.owner]}</span>
      <button class="task-del" onclick="removeTask('${t.id}')" title="삭제">×</button>
    </div>`).join('');
}
function findTask(id){ return state.tasks.find(t=>t.id===id); }
function toggleTask(id,v){ const t=findTask(id); if(t){t.done=v;saveTasks();renderSched();} }
function setTaskDate(id,v){ const t=findTask(id); if(t){t.date=v;saveTasks();renderSched();} }
function editTask(id,txt){ const t=findTask(id); if(!t) return; const v=(txt||'').trim(); if(!v){ renderSched(); return; } t.label=v; saveTasks(); }
function cycleOwner(id){ const t=findTask(id); if(t){t.owner=OWN_NEXT[t.owner];saveTasks();renderSched();} }
function addTask(){ if(!FLOW)return; state.tasks.push({id:'t'+(_tid++),label:'새 할 일',owner:'both',date:'',done:false}); saveTasks(); renderSched(); }
function removeTask(id){ state.tasks=state.tasks.filter(t=>t.id!==id); saveTasks(); renderSched(); }

function renderResult(){
  FLOW=buildFlow();
  loadSavedFlow();
  document.getElementById('sn-title').innerHTML=`${state.brand} <span class="sn-sep">·</span> <em>${FLOW.emoji} ${FLOW.name}</em>`;
  state.photoSlots=loadPhotos(); state.tasks=loadTasks();
  renderMeta(); renderBrandBar(); renderLegend(); renderFlow();
  document.getElementById('stage-wizard').classList.add('hidden');
  document.getElementById('stage-result').classList.remove('hidden');
  document.getElementById('result-actions').classList.remove('hidden');
  window.scrollTo({top:0,behavior:'smooth'});
}

/* ════════ 액션 ════════ */
function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove('show'),2400); }
function restart(){ if(confirm('처음부터 다시 만들까요? (입력 내용이 초기화됩니다)')){ location.href=location.pathname; } }
function downloadPDF(){ toast('인쇄 창에서 "PDF로 저장"을 선택하세요 (가로 권장)'); setTimeout(()=>window.print(),600); }
function copyJSON(){ const j=JSON.stringify(figmaJSON(),null,2); navigator.clipboard.writeText(j).then(()=>toast('Figma 배치용 JSON을 복사했어요')).catch(()=>toast('복사 실패 — JSON 박스에서 직접 선택해 주세요')); }
function downloadJSON(){ const j=JSON.stringify(figmaJSON(),null,2); const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([j],{type:'application/json'})); a.download=`${state.brand||'campaign'}-flow.json`; a.click(); URL.revokeObjectURL(a.href); toast('⬇ flow.json 내려받기'); }

renderStep();
</script>
